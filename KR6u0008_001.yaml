body:
  text: 爾時觀世音菩薩摩服偏袒右肩頭面著地為作禮䠒跪合掌而白佛言世尊我等無量諸菩薩眾并及一切諸天人等以於佛前廣聞諸法敷演解說妙法華經心淨踊躍得未曾有重白佛言世尊我常晝夜周旋往返十方一切無量世界教化眾生未知天地深淺近遠唯願世尊為我解說令我大眾悉皆得聞爾時佛告觀世音菩薩摩訶薩恒河沙諸菩薩等汝今諦聽之吾當為汝分別解說如是大地深二十億萬里次有潤澤亦深二十億萬里次有金銀琉璃車渠馬瑙珊瑚虎珀諸妙珍寶深四十億萬里次有金粟深八十億萬里次有銀剛亦深八十億萬里次有銀粟深百億萬里次有金剛深二百億萬里下有無極大風稱其天地不使傾動其大地者是天之梁柱何以故天下所有一切萬物皆因於地及河大海小海汎瀾井谷卉木聚林藥草諸樹皆地生長土山里山小鐵圍山及彌樓山金剛山須彌山等如是一切眾妙寶山諸山中王四寶涌成高出一切眾妙寶山皆因大地涌出珍寶而共合成又須彌山王四寶涌成高出一切諸世間上何等為四南名琉璃西名頗梨北名馬瑙東名黃金四寶光炎照曜四方天下眾生共相瞻視謂名為天須彌山者是天主護世四鎮依止而住何等為須彌山南有無量七寶宮殿去地百萬里中有天王名毘
